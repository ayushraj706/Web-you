name: NeuralTube-Browser-Build

on:
  workflow_dispatch: # Manual run ke liye (mobile users ke liye best hai)
  push:
    branches: [ main ]

jobs:
  build:
    name: Generate Fulguris APK
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Code (With Submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive # Fulguris ke liye ye zaroori hai

      - name: 2. Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: 3. Grant Execute Permission
        run: chmod +x gradlew

      - name: 4. Build Slions Full Download APK
        # Ye wahi command hai jo aapne pucha tha
        run: ./gradlew assembleSlionsFullDownload --no-daemon --stacktrace

      - name: 5. Upload Browser APK
        uses: actions/upload-artifact@v4
        with:
          name: NeuralTube-Fulguris-APK
          # Iska path check kar lena, mostly yahi hota hai:
          path: "app/build/outputs/apk/slionsFullDownload/debug/*.apk"
          if-no-files-found: error
          
